services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      BUDGET_DATA_ROOT: /app/data
      BUDGET_DATA_DIR: /app/data/current
      BUDGET_STORAGE_DIR: /app/storage
      BUDGET_UPLOAD_DIR: /app/storage/uploads
      BUDGET_EXPORT_DIR: /app/storage/exports
    volumes:
      - ./backend/data:/app/data
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
