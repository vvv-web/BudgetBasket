services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_NAME}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - budgetbasket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE}
    container_name: ${SEAWEEDFS_CONTAINER_NAME}
    command: >
      server
      -dir=${SEAWEEDFS_DATA_DIR}
      -s3
      -s3.port=${SEAWEEDFS_S3_PORT}
      -filer
      -filer.port=${SEAWEEDFS_FILER_PORT}
      -master.port=${SEAWEEDFS_MASTER_PORT}
      -volume.port=${SEAWEEDFS_VOLUME_PORT}
    ports:
      - "${SEAWEEDFS_S3_HOST_PORT}:${SEAWEEDFS_S3_PORT}"
      - "${SEAWEEDFS_FILER_HOST_PORT}:${SEAWEEDFS_FILER_PORT}"
      - "${SEAWEEDFS_MASTER_HOST_PORT}:${SEAWEEDFS_MASTER_PORT}"
    volumes:
      - budgetbasket_seaweedfs_data:${SEAWEEDFS_DATA_DIR}
    networks:
      - storage

  pgadmin:
    image: ${PGADMIN_IMAGE}
    container_name: ${PGADMIN_CONTAINER_NAME}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_HOST_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data

  file_guard:
    build:
      context: .
      dockerfile: file_guard/Dockerfile
    container_name: ${FILE_GUARD_CONTAINER_NAME}
    environment:
      FILE_GUARD_PORT: ${FILE_GUARD_PORT}
      FILE_GUARD_MAX_FILE_SIZE_BYTES: ${FILE_GUARD_MAX_FILE_SIZE_BYTES}
      FILE_GUARD_ALLOWED_EXTENSIONS: ${FILE_GUARD_ALLOWED_EXTENSIONS}
      FILE_GUARD_ALLOWED_MIME_TYPES: ${FILE_GUARD_ALLOWED_MIME_TYPES}
      FILE_GUARD_STRUCTURAL_VALIDATION_ENABLED: ${FILE_GUARD_STRUCTURAL_VALIDATION_ENABLED}
      FILE_GUARD_ALLOW_LIBMAGIC_FALLBACK: ${FILE_GUARD_ALLOW_LIBMAGIC_FALLBACK}
      FILE_GUARD_ANTIVIRUS_ENABLED: ${FILE_GUARD_ANTIVIRUS_ENABLED}
      FILE_GUARD_REQUIRE_ANTIVIRUS: ${FILE_GUARD_REQUIRE_ANTIVIRUS}
      FILE_GUARD_ANTIVIRUS_TIMEOUT_SECONDS: ${FILE_GUARD_ANTIVIRUS_TIMEOUT_SECONDS}
      FILE_GUARD_SCAN_TIMEOUT_SECONDS: ${FILE_GUARD_SCAN_TIMEOUT_SECONDS}
      FILE_GUARD_CLAMD_SOCKET_PATH: ${FILE_GUARD_CLAMD_SOCKET_PATH}
      FILE_GUARD_CLAMD_STREAM_CHUNK_BYTES: ${FILE_GUARD_CLAMD_STREAM_CHUNK_BYTES}
      FILE_GUARD_OFFICE_MAX_ENTRIES: ${FILE_GUARD_OFFICE_MAX_ENTRIES}
      FILE_GUARD_OFFICE_MAX_TOTAL_UNCOMPRESSED_BYTES: ${FILE_GUARD_OFFICE_MAX_TOTAL_UNCOMPRESSED_BYTES}
      FILE_GUARD_OFFICE_MAX_ENTRY_UNCOMPRESSED_BYTES: ${FILE_GUARD_OFFICE_MAX_ENTRY_UNCOMPRESSED_BYTES}
      FILE_GUARD_OFFICE_MAX_COMPRESSION_RATIO: ${FILE_GUARD_OFFICE_MAX_COMPRESSION_RATIO}
      FILE_GUARD_OFFICE_MAX_XML_SCAN_BYTES: ${FILE_GUARD_OFFICE_MAX_XML_SCAN_BYTES}
      FILE_GUARD_OFFICE_MAX_ENTRY_NAME_LENGTH: ${FILE_GUARD_OFFICE_MAX_ENTRY_NAME_LENGTH}
      FILE_GUARD_UPLOAD_READ_CHUNK_BYTES: ${FILE_GUARD_UPLOAD_READ_CHUNK_BYTES}
      FILE_GUARD_IMAGE_MAX_WIDTH: ${FILE_GUARD_IMAGE_MAX_WIDTH}
      FILE_GUARD_IMAGE_MAX_HEIGHT: ${FILE_GUARD_IMAGE_MAX_HEIGHT}
      FILE_GUARD_IMAGE_MAX_PIXELS: ${FILE_GUARD_IMAGE_MAX_PIXELS}
      FILE_GUARD_CLAMAV_UPDATE_ON_START: ${FILE_GUARD_CLAMAV_UPDATE_ON_START}
      FILE_GUARD_FRESHCLAM_ATTEMPTS: ${FILE_GUARD_FRESHCLAM_ATTEMPTS}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${FILE_GUARD_PORT}/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app

  backend:
    build:
      context: ./backend
    container_name: ${BACKEND_CONTAINER_NAME}
    ports:
      - "${BACKEND_HOST_PORT}:${APP_PORT}"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host ${APP_HOST} --port ${APP_PORT}"
    environment:
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      MAX_UPLOAD_FILE_SIZE_MB: ${MAX_UPLOAD_FILE_SIZE_MB}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES}
      FILE_GUARD_URL: ${FILE_GUARD_URL}
      FILE_GUARD_CONNECT_TIMEOUT_SECONDS: ${FILE_GUARD_CONNECT_TIMEOUT_SECONDS}
      FILE_GUARD_READ_TIMEOUT_SECONDS: ${FILE_GUARD_READ_TIMEOUT_SECONDS}
      BUDGET_EXPORT_DIR: ${BUDGET_EXPORT_DIR}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      file_guard:
        condition: service_healthy
    networks:
      - app
      - data
      - storage

  frontend:
    build:
      context: ./frontend
    container_name: ${FRONTEND_CONTAINER_NAME}
    command: npm run dev -- --port ${FRONTEND_PORT}
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_PORT}"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - app

volumes:
  budgetbasket_postgres_data:
  budgetbasket_seaweedfs_data:

networks:
  app:
  data:
    internal: true
  storage:
    internal: true
