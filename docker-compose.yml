services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      BUDGET_DATA_ROOT: /app/data
      BUDGET_DATA_DIR: /app/data/current
      BUDGET_UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
